<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e0a3c"/>
      <stop offset="45%" stop-color="#3b0764"/>
      <stop offset="100%" stop-color="#6b21a8"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="48%" r="45%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.0"/>
      <stop offset="70%" stop-color="#4c1d95" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#2e1065" stop-opacity="0.5"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Subtle corner vignette -->
  <rect width="512" height="512" fill="url(#outerGlow)"/>

  <!-- Ambient glow behind bolt -->
  <ellipse cx="256" cy="248" rx="170" ry="160" fill="url(#glow)"/>

  <!-- Lightning bolt: original 48×46 viewBox, scaled ×5.8, centered -->
  <!-- scale=5.8 → 278×267 → offset x=(512-278)/2=117, y=(512-267)/2=122 -->
  <g transform="translate(117,122) scale(5.8)">
    <path fill="url(#gold)"
      d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z"/>
  </g>

  <!-- "NOVA" wordmark at bottom -->
  <text
    x="256" y="462"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="52"
    font-weight="900"
    letter-spacing="10"
    text-anchor="middle"
    fill="#fbbf24"
    opacity="0.92">NOVA</text>
</svg>
